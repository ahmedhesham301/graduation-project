services:
  db:
    image: postgis/postgis:18-3.6-alpine
    container_name: postgis
    environment:
      - POSTGRES_PASSWORD=1234
    ports:
      - 5432:5432
    restart: unless-stopped
    volumes:
      - ./configs/sql/:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pg_admin:
    image: dpage/pgadmin4:latest
    container_name: pg_admin
    environment:
      - PGADMIN_DEFAULT_EMAIL=ahmed.hesham.farag@gmail.com
      - PGADMIN_DEFAULT_PASSWORD=1234
      - PGADMIN_LISTEN_ADDRESS=0.0.0.0
    ports:
      - 81:80
    restart: unless-stopped

  redis-stack:
    image: redis/redis-stack
    hostname: redis
    ports:
      - 6379:6379
      - 8001:8001
    environment:
      REDIS_ARGS: "--requirepass 1234"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a 1234 ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  api:
    image: ahmedhesham301/3akarati:latest
    ports:
      - 8081:8080
    environment:
      PGHOST: db
      PGPASSWORD: 1234
      PGUSER: postgres
      REDIS_HOST: redis-stack
      REDIS_PORT: 6379
      REDIS_PASSWORD: 1234
      SESSION_SECRET: 1234
    depends_on:
        db:
          condition: service_healthy
        redis-stack:
          condition: service_healthy

