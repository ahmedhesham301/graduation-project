services:
  db:
    image: postgis/postgis
    container_name: postgis
    environment:
      - POSTGRES_PASSWORD=1234
    ports:
      - 5432:5432
    restart: unless-stopped
    volumes:
      - ./configs/sql/:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  

  redis-stack:
    image: redis/redis-stack
    hostname: redis
    ports:
      - 6379:6379
      - 8001:8001
    environment:
      REDIS_ARGS: "--requirepass 1234"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a 1234 ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  api:
    image: ahmedhesham301/3akarati:latest
    restart: unless-stopped
    ports:
      - 8080:8080
    environment:
      PGHOST: db
      PGPASSWORD: 1234
      PGUSER: postgres
      REDIS_HOST: redis-stack
      REDIS_PORT: 6379
      REDIS_PASSWORD: 1234
      SESSION_SECRET: 1234
      ENV: dev
      S3_ENDPOINT: rustfs:9000
      BUCKET_NAME: testpublic
      S3_ACCESS_KEY: rustfsadmin
      S3_SECRET_KEY: rustfsadmin
    depends_on:
        db:
          condition: service_healthy
        redis-stack:
          condition: service_healthy
        rustfs:
          condition: service_started

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    ports:
      - 9000:9000
      - 9001:9001
