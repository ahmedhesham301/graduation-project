apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cache
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cache
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: redis-stack
          image: redis/redis-stack:latest
          ports:
            - containerPort: 6379
          envFrom:
            - configMapRef:
                name: cache-cm
